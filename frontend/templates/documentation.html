{% extends "base.html" %}

{% block title %}项目列表{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center">
            <h2>
                <i class="bi bi-folder2-open me-2 text-primary"></i>
                我的项目
            </h2>
            <a href="/create-project" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>新建项目
            </a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body" id="projects-container">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                    <p class="mt-3 text-muted">正在加载项目列表...</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', async function() {
        await loadProjects();
    });
    
    async function loadProjects() {
        const container = document.getElementById('projects-container');
        
        try {
            const response = await apiRequest('/projects');
            
            if (response.success) {
                const projects = response.data || [];
                
                if (projects.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-5">
                            <i class="bi bi-inbox text-muted" style="font-size: 3rem;"></i>
                            <h5 class="mt-3 text-muted">暂无项目</h5>
                            <p class="text-muted">点击上方按钮创建您的第一个项目</p>
                            <a href="/create-project" class="btn btn-primary mt-2">
                                <i class="bi bi-plus-circle me-1"></i>创建项目
                            </a>
                        </div>
                    `;
                    return;
                }
                
                let html = `
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>项目名称</th>
                                    <th>创建时间</th>
                                    <th>业务场景</th>
                                    <th>当前步骤</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                projects.forEach(project => {
                    const scenario = project.scenario || {};
                    const scenarioText = scenario.detected ? 
                        `${scenario.loan_phase_name || ''} - ${scenario.sub_scenario_name || ''}` : 
                        '<span class="text-muted">未识别</span>';
                    
                    const stepNames = [
                        '项目创建',
                        '数据上传',
                        '场景识别',
                        '数据准备',
                        '特征工程',
                        '模型训练',
                        '模型评估',
                        '模型部署'
                    ];
                    const currentStep = stepNames[project.current_step] || '未知';
                    
                    html += `
                        <tr onclick="window.location.href='/project/${project.id}'" style="cursor: pointer;">
                            <td>
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-folder text-primary me-2"></i>
                                    <strong>${project.name}</strong>
                                </div>
                            </td>
                            <td>${formatDate(project.created_at)}</td>
                            <td>${scenarioText}</td>
                            <td>
                                <span class="badge bg-info">${currentStep}</span>
                            </td>
                            <td>${getStatusBadge(project.status)}</td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a href="/project/${project.id}" class="btn btn-outline-primary">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                
                html += `
                            </tbody>
                        </table>
                    </div>
                `;
                
                container.innerHTML = html;
            } else {
                throw new Error(response.error || '加载失败');
            }
        } catch (error) {
            container.innerHTML = `
                <div class="text-center py-5">
                    <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
                    <h5 class="mt-3 text-muted">加载失败</h5>
                    <p class="text-muted">${error.message}</p>
                    <button class="btn btn-primary mt-2" onclick="loadProjects()">
                        <i class="bi bi-arrow-clockwise me-1"></i>重试
                    </button>
                </div>
            `;
        }
    }
    
    function getStatusBadge(status) {
        const badges = {
            'created': '<span class="badge bg-secondary">已创建</span>',
            'completed': '<span class="badge bg-success">已完成</span>',
            'error': '<span class="badge bg-danger">出错</span>'
        };
        return badges[status] || '<span class="badge bg-warning">进行中</span>';
    }
</script>
{% endblock %}
